appearance:
  default: system
  switcher: true

theme:
  colorPalettes:
    default:
      light:
        - "#002147"
        - "#0099ff"
        - "#4db8ff"
        - "#eb1e4e"
        - "#aebccd"
        - "#013a73"
        - "#ee5c79"
        - "#5b6b82"
        - "#f59ca9"
        - "#0a6db0"
      dark:
        - "#4db8ff"
        - "#0099ff"
        - "#013a73"
        - "#ee5c79"
        - "#5b6b82"
        - "#002147"
        - "#f59ca9"
        - "#aebccd"
        - "#eb1e4e"
        - "#0a6db0"
  colorScales:
    default:
      light:
        - "#a5cdee"
        - "#002147"
      dark:
        - "#a5cdee"
        - "#002147"
  colors:
    primary:
      light: "#002147"
      dark: "#4db8ff"
    accent:
      light: "#0099ff"
      dark: "#4db8ff"
    base:
      light: "#eef3f9"
      dark: "#09090b"
    info:
      light: "#0099ff"
      dark: "#38bdf8"
    positive:
      light: "#0e9f6e"
      dark: "#4ade80"
    warning:
      light: "#f8c900"
      dark: "#fbbf24"
    negative:
      light: "#eb1e4e"
      dark: "#ee5c79"

plugins:
  components:
    # This loads all of evidence's core charts and UI components
    # You probably don't want to edit this dependency unless you know what you are doing
    "@evidence-dev/core-components": {}

  datasources:
    # You can add additional datasources here by adding npm packages.
    # Make to also add them to `package.json`.
    "@evidence-dev/bigquery": {}
    "@evidence-dev/csv": {}
    "@evidence-dev/databricks": {}
    "@evidence-dev/duckdb": {}
    "@evidence-dev/mssql": {}
    "@evidence-dev/mysql": {}
    "@evidence-dev/postgres": {}
    "@evidence-dev/source-javascript": {}
    "@evidence-dev/snowflake": {}
    "@evidence-dev/sqlite": {}
    "@evidence-dev/trino": {}
    "@evidence-dev/motherduck": {}
